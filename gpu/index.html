<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GPU Monitor — alin14 + alin15</title>
<style>
  :root {
    --bg: #0e0e10;
    --panel: #18181b;
    --border: #27272a;
    --text: #fafafa;
    --muted: #a1a1aa;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 16px; }
  header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  h1 { margin: 0; font-size: 18px; font-weight: 600; }
  .last-update { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .servers { display: grid; grid-template-columns: repeat(auto-fit, minmax(440px, 1fr)); gap: 12px; }
  .server { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .server h2 { margin: 0 0 8px 0; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .server h2 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .server h2 .dot.stale { background: var(--red); }
  .gpus { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 8px; }
  .gpu { background: #0a0a0d; border: 1px solid var(--border); border-radius: 4px; padding: 4px 6px; font-family: var(--mono); font-size: 10px; }
  .gpu .idx { color: var(--muted); }
  .gpu .util { font-weight: 700; }
  .gpu .util.hi { color: var(--green); }
  .gpu .util.mid { color: var(--yellow); }
  .gpu .util.low { color: var(--muted); }
  .bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 2px; overflow: hidden; }
  .bar > div { height: 100%; background: var(--blue); transition: width .3s; }
  .section { margin-top: 10px; }
  .section h3 { margin: 0 0 4px 0; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .tmux { display: flex; flex-wrap: wrap; gap: 4px; font-family: var(--mono); font-size: 11px; }
  .tmux span { background: #0a0a0d; border: 1px solid var(--border); padding: 2px 6px; border-radius: 3px; color: var(--green); }
  .tmux span.idle { color: var(--muted); }
  pre.log { font-family: var(--mono); font-size: 11px; line-height: 1.4; background: #0a0a0d; border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; margin: 0; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
  pre.log .ok { color: var(--green); }
  pre.log .fail { color: var(--red); }
  pre.log .start { color: var(--blue); }
  pre.log .step { color: var(--yellow); }
  .summary-table { font-family: var(--mono); font-size: 11px; width: 100%; border-collapse: collapse; }
  .summary-table th, .summary-table td { text-align: left; padding: 4px 6px; border-bottom: 1px solid var(--border); }
  .summary-table th { color: var(--muted); font-weight: 500; }
  .meta { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .err { color: var(--red); font-family: var(--mono); font-size: 11px; }
</style>
</head>
<body>
<header>
  <h1>GPU Monitor</h1>
  <span class="last-update" id="ts">loading...</span>
  <span class="meta">refresh: 30s · auto</span>
</header>

<div class="servers" id="servers">
  <div class="server"><div>loading…</div></div>
</div>

<script>
const DATA_URL = 'data.json?t=' + Date.now();

function utilColor(u) {
  if (u >= 70) return 'hi';
  if (u >= 30) return 'mid';
  return 'low';
}

function highlightLog(line) {
  let cls = '';
  if (/\bOK\b|=== ALL|TRAIN.*loss/.test(line)) cls = 'ok';
  else if (/FAIL|ERROR|Traceback/.test(line)) cls = 'fail';
  else if (/START|STAGE/.test(line)) cls = 'start';
  else if (/step=|N=|epoch/.test(line)) cls = 'step';
  if (!cls) return escapeHtml(line);
  return `<span class="${cls}">${escapeHtml(line)}</span>`;
}

function escapeHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderServer(name, data) {
  const stale = data.stale_seconds && data.stale_seconds > 90 ? 'stale' : '';
  const gpus = (data.gpus || []).map(g => `
    <div class="gpu">
      <div><span class="idx">[${g.idx}]</span> <span class="util ${utilColor(g.util)}">${g.util}%</span></div>
      <div>${g.mem_used} / ${g.mem_total} MiB</div>
      <div class="bar"><div style="width:${(g.mem_used/g.mem_total*100).toFixed(0)}%"></div></div>
    </div>`).join('');

  const tmux = (data.tmux_sessions || []).map(s =>
    `<span class="${s.startsWith('a14_') || s.startsWith('a15_') || s.includes('train') || s.includes('eval') || s.includes('rollout') || s.includes('reasoning') ? '' : 'idle'}">${escapeHtml(s)}</span>`
  ).join('');

  const recent = (data.recent_events || []).map(highlightLog).join('\n');
  const summary = (data.summaries || []).map(s =>
    `<tr><td>${escapeHtml(s.label)}</td><td>${escapeHtml(s.metric)}</td></tr>`
  ).join('');

  const err = data.error ? `<div class="err">⚠️ ${escapeHtml(data.error)}</div>` : '';

  return `
    <div class="server">
      <h2><span class="dot ${stale}"></span> ${escapeHtml(name)} <span class="meta">· ${data.gpu_type || ''} · ${data.tmux_sessions ? data.tmux_sessions.length : 0} sessions${data.stale_seconds ? ' · ' + Math.round(data.stale_seconds) + 's old' : ''}</span></h2>
      ${err}
      <div class="section">
        <h3>GPUs</h3>
        <div class="gpus">${gpus}</div>
      </div>
      <div class="section">
        <h3>tmux</h3>
        <div class="tmux">${tmux || '<span class="idle">none</span>'}</div>
      </div>
      <div class="section">
        <h3>Recent events</h3>
        <pre class="log">${recent}</pre>
      </div>
      ${summary ? `
      <div class="section">
        <h3>Latest accuracies</h3>
        <table class="summary-table">${summary}</table>
      </div>` : ''}
    </div>`;
}

async function refresh() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    const j = await r.json();
    document.getElementById('ts').textContent = 'updated ' + j.updated;
    const servers = document.getElementById('servers');
    servers.innerHTML = (j.servers || []).map(s => renderServer(s.name, s)).join('');
  } catch (e) {
    document.getElementById('ts').textContent = 'fetch failed: ' + e.message;
  }
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
